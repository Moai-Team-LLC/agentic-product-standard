name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  links:
    name: Internal links & skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check relative links resolve
        run: |
          set -euo pipefail
          status=0
          # Resolve each markdown relative link against ITS OWN file's directory
          # (how GitHub renders them) — not against the repo root. Skip
          # http/https/mailto and pure in-page anchors; strip any #anchor.
          while IFS= read -r md; do
            dir=$(dirname "$md")
            while IFS= read -r link; do
              [ -z "$link" ] && continue
              if [ ! -e "$dir/$link" ]; then
                echo "::error file=$md::Broken relative link: $link"
                status=1
              fi
            done < <(grep -oE '\]\([^)]+\)' "$md" \
                       | sed -E 's/^\]\(([^)]+)\)$/\1/' \
                       | grep -vE '^(https?:|mailto:|#)' \
                       | sed -E 's/#.*$//')
          done < <(find . -name '*.md' -not -path './.git/*' -not -path './node_modules/*')
          exit $status

      - name: Check every SKILL.md has name + description frontmatter
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r f; do
            if ! head -n 10 "$f" | grep -q '^name:'; then
              echo "::error::$f missing 'name:' frontmatter"; status=1
            fi
            if ! head -n 10 "$f" | grep -q '^description:'; then
              echo "::error::$f missing 'description:' frontmatter"; status=1
            fi
          done < <(find skills -name 'SKILL.md')
          exit $status

      - name: AGENT_STANDARD.md root copy stays in sync with the bundled skill copy
        run: |
          # The single-agent standard is first-class at the repo root AND bundled
          # into skills/agent-builder/ so the skill ships self-contained. The two
          # must be byte-identical (the doc is written link-free so location does
          # not matter). Edit one, then copy to the other.
          if ! diff -q AGENT_STANDARD.md skills/agent-builder/AGENT_STANDARD.md; then
            echo "::error::AGENT_STANDARD.md (root) and skills/agent-builder/AGENT_STANDARD.md have drifted — they must be identical. Run: cp AGENT_STANDARD.md skills/agent-builder/AGENT_STANDARD.md"
            exit 1
          fi
